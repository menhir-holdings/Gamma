<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamma</title>
  <style>
    :root {
      --bg: #111;
      --text: #eee;
      --muted: #666;
      --border: #333;
      --active: #2a2a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body.dragging { user-select: none; cursor: grabbing; }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      width: min(440px, 100%);
    }

    .ring-wrap {
      position: relative;
      width: 280px;
      height: 280px;
    }

    .ring-wrap.dragging #ring { cursor: grabbing; }

    #ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      cursor: crosshair;
      touch-action: none;
    }

    .thumb {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .pattern-toggle {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      width: 100%;
    }

    .pattern-btn {
      flex: 1 1 calc(50% - 0.2rem);
      min-width: 0;
      padding: 0.45rem 0.5rem;
      font-size: 0.7rem;
      line-height: 1.2;
      text-align: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .pattern-btn:hover { color: var(--text); border-color: #555; }
    .pattern-btn.active { color: var(--text); border-color: #888; background: var(--active); }

    .slider-row { display: flex; flex-direction: column; gap: 0.3rem; }
    .slider-row label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .slider-row label span:last-child {
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    input[type="range"] { width: 100%; accent-color: #888; }

    .output { width: 100%; display: flex; flex-direction: column; gap: 0.35rem; }
    .hex-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.15rem 0; }
    .chip {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .hex { flex: 1; font-family: ui-monospace, monospace; font-size: 0.85rem; color: var(--muted); }
    .copy-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; padding: 0; border: none; border-radius: 6px;
      background: transparent; color: var(--muted); cursor: pointer; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .copy-btn:hover { color: var(--text); background: var(--active); }
    .copy-btn svg { width: 14px; height: 14px; }
    .copy-btn.copied { color: #8c8; }
  </style>
</head>
<body>
  <div class="app">
    <div class="ring-wrap" id="ringWrap">
      <canvas id="ring" width="560" height="560"></canvas>
      <div class="thumb" id="thumb"></div>
    </div>
    <div class="controls">
      <div class="pattern-toggle" id="patternToggle"></div>
      <div class="slider-row">
        <label><span>Saturation</span><span id="satVal">65.0%</span></label>
        <input type="range" id="saturation" min="0" max="100" step="0.1" value="65" />
      </div>
      <div class="slider-row">
        <label><span>Lightness</span><span id="lightVal">55.0%</span></label>
        <input type="range" id="lightness" min="0" max="100" step="0.1" value="55" />
      </div>
    </div>
    <div class="output" id="output"></div>
  </div>
  <script>
    const COPY_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const COF_SEMITONES = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
    const PATTERNS = [
      { name: "Power Fifth", semitones: [0, 7] },
      { name: "Major Triad", semitones: [0, 4, 7] },
      { name: "Minor Triad", semitones: [0, 3, 7] },
      { name: "Major Pentatonic", semitones: [0, 2, 4, 7, 9] },
      { name: "Major 7th", semitones: [0, 4, 7, 11] },
      { name: "Dorian", semitones: [0, 3, 7, 9] },
      { name: "Sus4", semitones: [0, 5, 7] },
      { name: "Minor Pentatonic", semitones: [0, 3, 5, 7, 10] },
      { name: "Dom 7th", semitones: [0, 4, 7, 10] },
      { name: "Min 7th", semitones: [0, 3, 7, 10] },
      { name: "Lydian", semitones: [0, 4, 6, 11] },
      { name: "Phrygian", semitones: [0, 1, 3, 7] },
      { name: "Augmented", semitones: [0, 4, 8] },
      { name: "Whole Tone", semitones: [0, 2, 4, 6, 8, 10] },
    ];
    const state = { pattern: 0, baseHue: 0, saturation: 65, lightness: 55 };
    const canvas = document.getElementById("ring");
    const ringWrap = document.getElementById("ringWrap");
    const ctx = canvas.getContext("2d");
    const thumb = document.getElementById("thumb");
    const SIZE = 280, CX = SIZE, CY = SIZE, OUTER = SIZE - 8, INNER = SIZE - 52;

    function fmtPct(n) { return `${n.toFixed(1)}%`; }
    function semitoneToCofIndex(s) { return COF_SEMITONES.indexOf(((s % 12) + 12) % 12); }
    function cofIndexToHue(k, baseHue) { return (((baseHue + k * 30) % 360) + 360) % 360; }

    function getPalette() {
      const semitones = PATTERNS[state.pattern].semitones;
      const cofIndices = [...new Set(semitones.map(semitoneToCofIndex))].sort((a, b) => a - b);
      return cofIndices.map((k) => {
        const hue = cofIndexToHue(k, state.baseHue);
        return { hue, hex: hslToHex(hue, state.saturation, state.lightness) };
      });
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = l - c / 2;
      let r, g, b;
      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];
      const hex = (v) => Math.round((v + m) * 255).toString(16).padStart(2, "0");
      return `#${hex(r)}${hex(g)}${hex(b)}`;
    }

    function drawRing() {
      const scale = canvas.width / (SIZE * 2);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.clearRect(0, 0, SIZE * 2, SIZE * 2);
      for (let deg = 0; deg < 360; deg++) {
        const a0 = ((deg - 90) * Math.PI) / 180;
        const a1 = ((deg + 1.2 - 90) * Math.PI) / 180;
        ctx.beginPath();
        ctx.arc(CX, CY, OUTER, a0, a1);
        ctx.arc(CX, CY, INNER, a1, a0, true);
        ctx.closePath();
        ctx.fillStyle = `hsl(${deg}, ${state.saturation}%, 50%)`;
        ctx.fill();
      }
      for (const { hue } of getPalette()) {
        const a = ((hue - 90) * Math.PI) / 180;
        const mx = CX + ((OUTER + INNER) / 2) * Math.cos(a);
        const my = CY + ((OUTER + INNER) / 2) * Math.sin(a);
        ctx.beginPath();
        ctx.arc(mx, my, 7, 0, Math.PI * 2);
        ctx.fillStyle = hslToHex(hue, state.saturation, state.lightness);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function updateThumb() {
      const midR = (OUTER + INNER) / 2;
      const a = ((state.baseHue - 90) * Math.PI) / 180;
      const x = CX + midR * Math.cos(a);
      const y = CY + midR * Math.sin(a);
      thumb.style.left = `${(x / (SIZE * 2)) * 100}%`;
      thumb.style.top = `${(y / (SIZE * 2)) * 100}%`;
      thumb.style.background = hslToHex(state.baseHue, state.saturation, state.lightness);
    }

    function renderPatternToggle() {
      const container = document.getElementById("patternToggle");
      container.innerHTML = PATTERNS.map((p, i) =>
        `<button type="button" class="pattern-btn ${i === state.pattern ? "active" : ""}" data-i="${i}">${p.name}</button>`
      ).join("");
      container.querySelectorAll(".pattern-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.pattern = +btn.dataset.i;
          renderPatternToggle();
          render();
        });
      });
    }

    function renderOutput() {
      document.getElementById("output").innerHTML = getPalette().map((c) =>
        `<div class="hex-row">
          <div class="chip" style="background:${c.hex}"></div>
          <span class="hex">${c.hex}</span>
          <button type="button" class="copy-btn" data-hex="${c.hex}" aria-label="Copy ${c.hex}">${COPY_ICON}</button>
        </div>`
      ).join("");
      document.getElementById("output").querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await navigator.clipboard.writeText(btn.dataset.hex);
          btn.classList.add("copied");
          setTimeout(() => btn.classList.remove("copied"), 1200);
        });
      });
    }

    function render() {
      drawRing();
      updateThumb();
      renderOutput();
      document.getElementById("satVal").textContent = fmtPct(state.saturation);
      document.getElementById("lightVal").textContent = fmtPct(state.lightness);
    }

    function ringMetrics() {
      const rect = canvas.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const minR = (INNER / SIZE) * (rect.width / 2);
      const maxR = rect.width / 2;
      return { cx, cy, minR, maxR };
    }

    function isOnRing(clientX, clientY) {
      const { cx, cy, minR, maxR } = ringMetrics();
      const dist = Math.hypot(clientX - cx, clientY - cy);
      return dist >= minR * 0.72 && dist <= maxR * 1.1;
    }

    function pointerToHue(clientX, clientY) {
      const { cx, cy } = ringMetrics();
      let angle = (Math.atan2(clientY - cy, clientX - cx) * 180) / Math.PI + 90;
      if (angle < 0) angle += 360;
      return angle;
    }

    let dragging = false;
    let activePointerId = null;

    function startDrag(e) {
      if (!isOnRing(e.clientX, e.clientY)) return;
      dragging = true;
      activePointerId = e.pointerId;
      document.body.classList.add("dragging");
      ringWrap.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
      state.baseHue = pointerToHue(e.clientX, e.clientY);
      render();
      e.preventDefault();
    }

    function moveDrag(e) {
      if (!dragging || e.pointerId !== activePointerId) return;
      state.baseHue = pointerToHue(e.clientX, e.clientY);
      render();
      e.preventDefault();
    }

    function endDrag(e) {
      if (activePointerId !== null && e.pointerId !== activePointerId) return;
      dragging = false;
      activePointerId = null;
      document.body.classList.remove("dragging");
      ringWrap.classList.remove("dragging");
      try { canvas.releasePointerCapture(e.pointerId); } catch {}
    }

    canvas.addEventListener("pointerdown", startDrag);
    canvas.addEventListener("pointermove", moveDrag);
    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    window.addEventListener("pointermove", moveDrag);
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);

    document.getElementById("saturation").addEventListener("input", (e) => {
      state.saturation = parseFloat(e.target.value);
      render();
    });
    document.getElementById("lightness").addEventListener("input", (e) => {
      state.lightness = parseFloat(e.target.value);
      render();
    });

    renderPatternToggle();
    render();
  </script>
</body>
</html>
